# Koyeb service for the NeuroLinked Brain web app (frontend + API).
# Deploy with:  koyeb service create --file koyeb/web.yaml
#
# Required env / secrets (set in the Koyeb UI or via `koyeb secret create`):
#   DATABASE_URL          Postgres connection string (Neon free tier works great)
#   GEMINI_API_KEY        Direct Gemini key from https://aistudio.google.com/app/apikey
#   GROQ_API_KEY_1..10    Your Groq keys (at least one)

name: neuro-brain-web
type: web
instance_type: free             # 512MB / 0.1 vCPU. Sleeps after ~10 min idle.
regions:
  - was
ports:
  - port: 8080
    protocol: http
routes:
  - path: /
    port: 8080
health_checks:
  - path: /api/healthz
    port: 8080
    interval: 30
    grace_period: 120
docker:
  dockerfile: koyeb/web.Dockerfile
env:
  - key: NODE_ENV
    value: production
  - key: PORT
    value: "8080"
  - key: DATABASE_URL
    secret: DATABASE_URL
  - key: GEMINI_API_KEY
    secret: GEMINI_API_KEY
scaling:
  min: 1
  max: 1
