openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: NeuroLinked Brain — multi-agent Ollama orchestration API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: regions
  - name: runs
  - name: insights
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /regions:
    get:
      operationId: listRegions
      tags: [regions]
      summary: List all 6 brain regions and their Ollama config
      responses:
        "200":
          description: Regions list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Region"
  /regions/{regionKey}:
    parameters:
      - in: path
        name: regionKey
        required: true
        schema:
          $ref: "#/components/schemas/RegionKey"
    get:
      operationId: getRegion
      tags: [regions]
      summary: Get a single region
      responses:
        "200":
          description: Region
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Region"
    patch:
      operationId: updateRegion
      tags: [regions]
      summary: Update a region's Ollama endpoint, model, or system prompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRegionInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Region"
  /regions/{regionKey}/ping:
    parameters:
      - in: path
        name: regionKey
        required: true
        schema:
          $ref: "#/components/schemas/RegionKey"
    post:
      operationId: pingRegion
      tags: [regions]
      summary: Test the Ollama endpoint for a region
      responses:
        "200":
          description: Ping result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PingResult"

  /runs:
    get:
      operationId: listRuns
      tags: [runs]
      summary: List recent autonomous runs
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RunSummary"
    post:
      operationId: createRun
      tags: [runs]
      summary: Start a new autonomous brain run
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRunInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunSummary"
  /runs/{runId}:
    parameters:
      - in: path
        name: runId
        required: true
        schema:
          type: string
    get:
      operationId: getRun
      tags: [runs]
      summary: Get a run with all messages
      responses:
        "200":
          description: Run detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunDetail"
  /runs/{runId}/cancel:
    parameters:
      - in: path
        name: runId
        required: true
        schema:
          type: string
    post:
      operationId: cancelRun
      tags: [runs]
      summary: Cancel an in-progress run
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunSummary"
  /runs/{runId}/stream:
    parameters:
      - in: path
        name: runId
        required: true
        schema:
          type: string
    get:
      operationId: streamRun
      tags: [runs]
      summary: Server-Sent Events stream of run activity
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string

  /insights/dashboard:
    get:
      operationId: getDashboardInsights
      tags: [insights]
      summary: Brain-wide stats — totals, region usage, recent activity
      responses:
        "200":
          description: Dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardInsights"
  /insights/region-activity:
    get:
      operationId: getRegionActivity
      tags: [insights]
      summary: Per-region message counts and avg latency over recent runs
      responses:
        "200":
          description: Region activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RegionActivity"

  /synapses:
    get:
      operationId: listSynapses
      tags: [synapses]
      summary: List all learned region-pair connections, strongest first
      responses:
        "200":
          description: Synapse list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Synapse"

  /tools:
    get:
      operationId: listTools
      tags: [tools]
      summary: List registered agent tools
      responses:
        "200":
          description: Tool list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tool"

  /tools/{name}/invoke:
    post:
      operationId: invokeTool
      tags: [tools]
      summary: Run a tool by name with JSON params
      parameters:
        - in: path
          name: name
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Tool result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
        "400":
          description: Tool error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"

  /insights:
    get:
      operationId: listInsights
      tags: [sleep]
      summary: List insights consolidated during sleep
      responses:
        "200":
          description: Insight list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Insight"

  /sleep/status:
    get:
      operationId: getSleepStatus
      tags: [sleep]
      summary: Sleep scheduler status
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SleepStatus"

  /sleep/run:
    post:
      operationId: runSleep
      tags: [sleep]
      summary: Manually trigger a sleep/consolidation cycle
      responses:
        "200":
          description: Cycle result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SleepCycleResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    RegionKey:
      type: string
      enum:
        - sensory_cortex
        - association_cortex
        - prefrontal_cortex
        - hippocampus
        - cerebellum
        - motor_cortex

    AgentRole:
      type: string
      enum: [researcher, planner, executor, memory, critic, summarizer]

    Region:
      type: object
      required: [key, role, name, description, ollamaUrl, model, systemPrompt, temperature, enabled]
      properties:
        key:
          $ref: "#/components/schemas/RegionKey"
        role:
          $ref: "#/components/schemas/AgentRole"
        name:
          type: string
        description:
          type: string
        ollamaUrl:
          type: string
          description: Base URL of an Ollama server (e.g. https://my-ollama.koyeb.app)
        model:
          type: string
          description: Ollama model tag, e.g. qwen2.5:1.5b-instruct
        systemPrompt:
          type: string
        temperature:
          type: number
          minimum: 0
          maximum: 2
        enabled:
          type: boolean

    UpdateRegionInput:
      type: object
      properties:
        ollamaUrl:
          type: string
        model:
          type: string
        systemPrompt:
          type: string
        temperature:
          type: number
        enabled:
          type: boolean

    PingResult:
      type: object
      required: [ok, latencyMs]
      properties:
        ok:
          type: boolean
        latencyMs:
          type: number
        modelsAvailable:
          type: array
          items:
            type: string
        error:
          type: string

    CreateRunInput:
      type: object
      required: [goal]
      properties:
        goal:
          type: string
        maxIterations:
          type: integer
          default: 6
          minimum: 1
          maximum: 20

    RunStatus:
      type: string
      enum: [pending, running, succeeded, failed, cancelled]

    RunSummary:
      type: object
      required: [id, goal, status, createdAt, iterations]
      properties:
        id:
          type: string
        goal:
          type: string
        status:
          $ref: "#/components/schemas/RunStatus"
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        iterations:
          type: integer
        finalAnswer:
          type: string
        error:
          type: string

    BrainMessage:
      type: object
      required: [id, runId, region, role, content, iteration, createdAt]
      properties:
        id:
          type: string
        runId:
          type: string
        region:
          $ref: "#/components/schemas/RegionKey"
        role:
          $ref: "#/components/schemas/AgentRole"
        content:
          type: string
        iteration:
          type: integer
        latencyMs:
          type: number
        createdAt:
          type: string
          format: date-time

    RunDetail:
      type: object
      required: [run, messages]
      properties:
        run:
          $ref: "#/components/schemas/RunSummary"
        messages:
          type: array
          items:
            $ref: "#/components/schemas/BrainMessage"

    DashboardInsights:
      type: object
      required: [totalRuns, succeededRuns, failedRuns, runningRuns, totalMessages, avgIterations, recentRuns]
      properties:
        totalRuns:
          type: integer
        succeededRuns:
          type: integer
        failedRuns:
          type: integer
        runningRuns:
          type: integer
        totalMessages:
          type: integer
        avgIterations:
          type: number
        recentRuns:
          type: array
          items:
            $ref: "#/components/schemas/RunSummary"

    RegionActivity:
      type: object
      required: [region, role, messageCount, avgLatencyMs]
      properties:
        region:
          $ref: "#/components/schemas/RegionKey"
        role:
          $ref: "#/components/schemas/AgentRole"
        messageCount:
          type: integer
        avgLatencyMs:
          type: number

    Synapse:
      type: object
      required: [fromRegion, toRegion, successCount, totalCount, strength, lastFiredAt, updatedAt]
      properties:
        fromRegion:
          type: string
        toRegion:
          type: string
        successCount:
          type: integer
        totalCount:
          type: integer
        strength:
          type: number
          description: Smoothed success rate, 0..1
        lastFiredAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Tool:
      type: object
      required: [name, description, paramsSchema]
      properties:
        name:
          type: string
        description:
          type: string
        paramsSchema:
          type: object
          additionalProperties: true

    ToolResult:
      type: object
      required: [ok, durationMs]
      properties:
        ok:
          type: boolean
        durationMs:
          type: number
        result: {}
        error:
          type: string

    Insight:
      type: object
      required: [id, kind, content, sourceRunIds, createdAt]
      properties:
        id:
          type: string
        kind:
          type: string
          enum: [pattern, lesson, preference]
        content:
          type: string
        sourceRunIds:
          type: array
          items: { type: string }
        createdAt:
          type: string
          format: date-time

    SleepStatus:
      type: object
      required: [isSleeping, insightsLastCycle]
      properties:
        isSleeping:
          type: boolean
        lastRunAt:
          type: string
          format: date-time
          nullable: true
        lastSleepAt:
          type: string
          format: date-time
          nullable: true
        insightsLastCycle:
          type: integer

    SleepCycleResult:
      type: object
      required: [insightsCreated, consideredRuns]
      properties:
        insightsCreated:
          type: integer
        consideredRuns:
          type: integer
        skippedReason:
          type: string
